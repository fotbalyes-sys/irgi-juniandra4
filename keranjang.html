<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keranjang Belanja</title>

<style>
body{
    font-family:Arial;
    padding:15px;
}

.item{
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
}

.item img{
    width:100%;
    max-width:250px;
    border-radius:10px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    color:white;
    background:red;
}
</style>
</head>

<body>

<h2>🛒 Keranjang Belanja</h2>

<div id="dataKeranjang"></div>

<a href="checkout.html">
<button>Checkout</button>
</a>

<script>

let keranjang =
JSON.parse(localStorage.getItem("keranjang")) || [];

let tampil = "";

keranjang.forEach((item,index)=>{

tampil += `
<div class="item">

<img src="${item.gambar}">

<h3>${item.nama}</h3>

<p>Harga : Rp ${item.harga}</p>

<p>Jumlah : ${item.qty}</p>

<p>Subtotal : Rp ${item.harga * item.qty}</p>

<button onclick="kurang(${index})">➖</button>

<b>${item.qty}</b>

<button onclick="tambah(${index})">➕</button>

<button onclick="hapus(${index})">
Hapus
</button>

</div>
`;

});

document.getElementById("dataKeranjang").innerHTML = tampil;
function tambah(index){

keranjang[index].qty++;

localStorage.setItem(
"keranjang",
JSON.stringify(keranjang)
);

location.reload();
}

function kurang(index){

keranjang[index].qty--;

if(keranjang[index].qty <= 0){
keranjang.splice(index,1);
}

localStorage.setItem(
"keranjang",
JSON.stringify(keranjang)
);

location.reload();
}

function hapus(index){

keranjang.splice(index,1);

localStorage.setItem(
"keranjang",
JSON.stringify(keranjang)
);

location.reload();
}
</script>

</body>
</html>
